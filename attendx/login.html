<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AttendX</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      🏢 <span>Attend<span class="accent">X</span></span>
    </div>
    <p class="auth-tagline">Attendance Management System</p>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to access your dashboard</p>

    <div class="alert" id="alert"></div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="jane@company.com"
          required
          autocomplete="email"
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Your password"
          required
          autocomplete="current-password"
        >
      </div>

      <div class="form-group" style="margin-top: 8px;">
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Sign In
        </button>
      </div>

    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>

  </div>

  <script type="module">
    import { handleLogin }    from './js/auth.js';
    import { supabase }       from './js/supabase-client.js';
    import { getUserProfile } from './js/supabase-client.js';

    // If already logged in, redirect to dashboard
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const profile = await getUserProfile(session.user.id);
      window.location.href = profile?.role === 'admin'
        ? '/dashboard/admin.html'
        : '/dashboard/employee.html';
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>

</body>
</html>
